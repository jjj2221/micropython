name: Build Custom ESP32-S3 Camera MicroPython

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. 拉取 MicroPython 主源码
    - name: Checkout MicroPython
      uses: actions/checkout@v4
      with:
        path: micropython

    # 2. 拉取官方摄像头驱动 Python 绑定库
    - name: Checkout Camera Driver Module
      uses: actions/checkout@v4
      with:
        repository: lemariva/micropython-camera-driver
        path: micropython-camera-driver

    # 3. 拉取 ESP32 底层硬件驱动库
    - name: Checkout ESP32 Hardware Driver
      uses: actions/checkout@v4
      with:
        repository: espressif/esp32-camera
        path: micropython/ports/esp32/components/esp32-camera

    # 4. 【核心修复】指定云端直接进入正确的子目录配置环境
    - name: Setup ESP-IDF Environment
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1.2'
        target: 'esp32s3'
        path: 'micropython/ports/esp32'  # 强制指定在 esp32 目录下安装环境

    # 5. 【核心修复】绑定路径，直接在正确的子目录里编译
    - name: Compile MicroPython with Camera
      run: |
        make submodules
        make BOARD=ESP32_GENERIC_S3 USER_C_MODULES=${{ github.workspace }}/micropython-camera-driver/src/micropython.cmake -j4
      working-directory: micropython/ports/esp32  # 这一行是关键，它强制云端在这个文件夹里干活！

    # 6. 上传固件成品
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: micropython-s3-camera-firmware
        path: micropython/ports/esp32/build-ESP32_GENERIC_S3/firmware.bin
