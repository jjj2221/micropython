name: Build Custom ESP32-S3 Camera MicroPython

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. 拉取微Python主仓库
    - name: Checkout MicroPython
      uses: actions/checkout@v4
      with:
        path: micropython

    # 2. 拉取摄像头驱动绑定层
    - name: Checkout Camera Driver Module
      uses: actions/checkout@v4
      with:
        repository: lemariva/micropython-camera-driver
        path: micropython-camera-driver

    # 3. 拉取底层硬件驱动库
    - name: Checkout ESP32 Hardware Driver
      uses: actions/checkout@v4
      with:
        repository: espressif/esp32-camera
        path: micropython/ports/esp32/components/esp32-camera

    # 4. 【核心】使用官方稳定 Action 一键配置环境
    - name: Setup ESP-IDF Environment
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1.2'
        target: 'esp32s3'
        path: 'micropython/ports/esp32'

    # 5. 【关键】不再依赖不支持的参数，直接写入配置文件开启 OPI PSRAM
    - name: Enable OPI PSRAM and Compile
      run: |
        cd micropython/ports/esp32
        # 创建配置文件，强制开启 OPI 内存模式，释放 D0-D7 引脚
        echo "CONFIG_ESP32S3_DEFAULT_PSRAM_OPI=y" > boards/ESP32_GENERIC_S3/sdkconfig.defaults
        # 开始全速编译
        make submodules
        make BOARD=ESP32_GENERIC_S3 USER_C_MODULES=${{ github.workspace }}/micropython-camera-driver/src/micropython.cmake -j4

    # 6. 上传最终产物
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: micropython-s3-ov7670-firmware
        path: micropython/ports/esp32/build-ESP32_GENERIC_S3/firmware.bin
